{
  "_comment": "caleon2mqtt config. JSON format; lookup keys are case-sensitive.",

  "can": {
    "interface": "vcan0"
  },

  "mqtt": {
    "host": "localhost",
    "port": 1883,
    "topic": "caleon",
    "qos": 0,
    "keepalive": 60,
    "retain_sensors": false,
    "client_id": "caleon2mqtt"
  },

  "_subscribers_doc": "subscriber_id (high byte of CAN id, after >>8). Add device names as you identify them; the JSON publish will gain a 'subscriber_name' field.",
  "subscribers": {
    "0x00": "broadcast",
    "0x97": "caleon_s",
    "0xB5": "caleon_box"
  },

  "_rooms_doc": "Key format: '<room_index>:<room_type>' (decimal). Only the room controller (0x83) response with dlc=6 carries these. RoomType byte appears to be the per-room icon/category picked in the Caleon app.",
  "rooms": {
    "0:40":  "entrance",
    "1:30":  "washing",
    "2:18":  "toilet",
    "3:8":   "bedroom",
    "4:39":  "storage",
    "5:11":  "office",
    "6:6":   "kitchen",
    "7:4":   "lounge"
  },

  "_hc_sensors_doc": "0x8B / DLF_SENSOR slot index -> friendly name. Slots 1..7 are 1-wire room temperature probes (kitchen uses CALEON S directly, not a 1-wire). Slots 0 and 8..9 are unused-but-configurable aux-function slots (Thermostat/Mixer/Difference/Season Switch/...); slots 10..13 are likely internal registers.",
  "hc_sensors": {
    "0x01": "T1_1wire",
    "0x02": "T2_1wire",
    "0x03": "T3_1wire",
    "0x04": "T4_1wire",
    "0x05": "T5_1wire",
    "0x06": "T6_1wire",
    "0x07": "T7_1wire"
  },

  "_hc_relays_doc": "0x8B / DLF_RELAY index -> friendly name. CALEONbox has terminals A..K + PWM N1/N4/N8. A=HC Pump (L/N out), B..I=8 zone valves mapped to the installer's rooms, J/K=free triggers (unused here), N1/N4/N8=PWM outputs for HC Mixer or similar.",
  "hc_relays": {
    "0x00": "A_hc_pump",
    "0x01": "B_washing",
    "0x02": "C_entrance",
    "0x03": "D_bedroom",
    "0x04": "E_toilet",
    "0x05": "F_lounge",
    "0x06": "G_storage",
    "0x07": "H_kitchen",
    "0x08": "I_office",
    "0x09": "J_free",
    "0x0A": "K_free",
    "0x0B": "N1_pwm",
    "0x0C": "N4_pwm",
    "0x0D": "N8_pwm"
  },

  "_aux_functions_doc": "Per the CALEONbox manual there are 10 configurable auxiliary functions (Thermostat, Difference, HC Mixer, Season Switch, etc.) that can be routed to spare outputs (J/K or PWM N1/N4/N8). Best guess: these correspond to DLF_SENSOR slots 0 and 8..9 plus other internal indices. Unconfigured slots report sentinel values (256 / 6400 / 2304).",
  "aux_functions": {
    "0": "Thermostat 2",
    "1": "Thermostat 3",
    "2": "Dehumidifier 2",
    "3": "HC Mixer",
    "4": "HC Pump",
    "5": "Difference",
    "6": "Season Switch 2",
    "7": "Timer 2",
    "8": "Energy Request",
    "9": "Fan Coil 2"
  }
}
