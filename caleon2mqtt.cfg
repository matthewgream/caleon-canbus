{
  "_comment": "caleon2mqtt config. JSON format; lookup keys are case-sensitive.",

  "can": {
    "interface": "vcan0"
  },

  "mqtt": {
    "host": "localhost",
    "port": 1883,
    "topic": "caleon",
    "qos": 0,
    "keepalive": 60,
    "retain_sensors": false,
    "client_id": "caleon2mqtt"
  },

  "_subscribers_doc": "subscriber_id (high byte of CAN id, after >>8). Add device names as you identify them; the JSON publish will gain a 'subscriber_name' field.",
  "subscribers": {
    "0x00": "broadcast",
    "0x97": "caleon_s",
    "0xB5": "caleon_box"
  },

  "_rooms_doc": "Key format: '<room_index>:<room_type>' (decimal). Only the room controller (0x83) response with dlc=6 carries these. RoomType byte appears to be the per-room icon/category picked in the Caleon app.",
  "rooms": {
    "0:40":  "entrance",
    "1:30":  "washing",
    "2:18":  "toilet",
    "3:8":   "bedroom",
    "4:39":  "storage",
    "5:11":  "office",
    "6:6":   "kitchen",
    "7:4":   "lounge"
  },

  "_hc_sensors_doc": "0x8B / DLF_SENSOR sensor index -> friendly name (e.g. T_collector, T_storage_top).",
  "hc_sensors": {
    "0x00": "S1",
    "0x01": "S2",
    "0x02": "S3",
    "0x03": "S4",
    "0x04": "S5",
    "0x05": "S6",
    "0x06": "S7",
    "0x07": "S8"
  },

  "_hc_relays_doc": "0x8B / DLF_RELAY relay index -> friendly name (e.g. R1_pump_primary, R2_diverter).",
  "hc_relays": {
    "0x00": "R1",
    "0x01": "R2",
    "0x02": "R3",
    "0x03": "R4",
    "0x04": "R5",
    "0x05": "R6",
    "0x06": "R7",
    "0x07": "R8"
  }
}
