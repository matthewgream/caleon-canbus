{
  "_comment": "caleon2mqtt config. JSON format; lookup keys are case-sensitive.",

  "can": {
    "interface": "vcan0"
  },

  "mqtt": {
    "host": "localhost",
    "port": 1883,
    "topic": "caleon",
    "qos": 0,
    "keepalive": 60,
    "retain_sensors": true,
    "client_id": "caleon2mqtt"
  },

  "_subscribers_doc": "subscriber_id (high byte of CAN id, after >>8). Add device names as you identify them; the JSON publish will gain a 'subscriber_name' field.",
  "subscribers": {
    "0x00": "broadcast",
    "0x97": "caleon_s",
    "0xB5": "caleon_box"
  },

  "_rooms_doc": "Key format: '<room_index>:<room_type>' (decimal). Only the room controller (0x83) response with dlc=6 carries these. RoomType byte appears to be the per-room icon/category picked in the Caleon app.",
  "rooms": {
    "0:40":  "living/mats",
    "1:30":  "tvattstuga",
    "2:18":  "dusch/toa",
    "3:8":   "sovrum",
    "4:39":  "forrad",
    "5:11":  "kontor",
    "6:6":   "kok",
    "7:4":   "allrum"
  },

  "_hc_sensors_doc": "0x8B / DLF_SENSOR slot index -> friendly name. Slots 0..9 are the 10 configurable CALEONbox auxiliary functions (Thermostat / Mixer / Difference / Season Switch / etc.) that can be routed to spare outputs (J/K or PWM N1/N4/N8). Slots 10..13 are internal (unnamed; they update in lockstep and show small fixed-looking values that aren't real sensor readings). Note: raw 1-wire temperatures (app's 181.1..181.7) live on a SEPARATE 1-wire bus inside the CALEONbox; they never appear on CAN directly -- the box maps them into things that do (room temps via 0x83 ecsRcTroom, aux-function inputs, storage temps, etc.).",
  "hc_sensors": {
    "0x00": "Thermostat 2",
    "0x01": "Thermostat 3",
    "0x02": "Dehumidifier 2",
    "0x03": "HC Mixer",
    "0x04": "HC Pump",
    "0x05": "Difference",
    "0x06": "Season Switch 2",
    "0x07": "Timer 2",
    "0x08": "Energy Request",
    "0x09": "Fan Coil 2"
  },

  "_hc_relays_doc": "0x8B / DLF_RELAY index -> friendly name. CALEONbox has terminals A..K + PWM N1/N4/N8. A=HC Pump (L/N out), B..I=8 zone valves mapped to the installer's rooms, J/K=free triggers (unused here), N1/N4/N8=PWM outputs for HC Mixer or similar.",
  "hc_relays": {
    "0x00": "A_hc_pump",
    "0x01": "B_washing",
    "0x02": "C_entrance",
    "0x03": "D_bedroom",
    "0x04": "E_toilet",
    "0x05": "F_lounge",
    "0x06": "G_storage",
    "0x07": "H_kitchen",
    "0x08": "I_office",
    "0x09": "J_free",
    "0x0A": "K_free",
    "0x0B": "N1_pwm",
    "0x0C": "N4_pwm",
    "0x0D": "N8_pwm"
  }
}
